name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: gh pr diff ${{ github.event.pull_request.number }} > pr.diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List available Gemini models (debug)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request

          api_key = os.environ['GEMINI_API_KEY']
          url = f"https://generativelanguage.googleapis.com/v1beta/models?key={api_key}"
          with urllib.request.urlopen(url) as resp:
              data = json.loads(resp.read())
          print("=== Models supporting generateContent ===")
          for m in data.get("models", []):
              if "generateContent" in m.get("supportedGenerationMethods", []):
                  print(m["name"])
          PYEOF

      - name: Review with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.error, subprocess, sys

          api_key = os.environ['GEMINI_API_KEY']
          pr_number = os.environ['PR_NUMBER']

          rules = open('CLAUDE.md').read()
          diff = open('pr.diff').read()

          if not diff.strip():
              print("No diff found, skipping review.")
              sys.exit(0)

          # Truncate diff if too large to stay within Gemini context limits
          MAX_DIFF_CHARS = 30000
          truncated = len(diff) > MAX_DIFF_CHARS
          if truncated:
              diff = diff[:MAX_DIFF_CHARS] + "\n\n[... diff truncated due to size ...]"

          prompt = f"""You are a strict code reviewer for a React + TypeScript + Vite + Tailwind CSS project.

          The project's coding rules are defined in CLAUDE.md:

          {rules}

          The pull request diff to review:

          ```diff
          {diff}
          ```

          Review ONLY the changed lines against the rules above.
          Structure your response in markdown:

          ## Overall
          One line verdict: **Pass ✅** or **Needs Changes ⚠️**

          ## Violations
          For each violation:
          - **File**: `path/to/file.tsx` line X
          - **Rule**: which rule is broken
          - **Fix**: what to change

          If no violations found, write: _No violations found._

          ## Suggestions _(optional)_
          Non-blocking improvements, if any.

          ## Good Practices
          What was done well.

          Be concise and actionable. Do not repeat rules that were followed correctly.
          """

          payload = {
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {"temperature": 0.1, "maxOutputTokens": 2048}
          }

          url = (
              "https://generativelanguage.googleapis.com/v1"
              f"/models/gemini-1.5-flash:generateContent?key={api_key}"
          )

          req = urllib.request.Request(
              url,
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
                  review = result["candidates"][0]["content"]["parts"][0]["text"]
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"Gemini API error {e.code}: {body}", file=sys.stderr)
              sys.exit(1)

          truncation_note = (
              "\n> ⚠️ Diff was truncated to 30,000 chars due to size.\n" if truncated else ""
          )

          comment = (
              "## 🤖 Gemini Code Review\n\n"
              f"{truncation_note}"
              f"{review}\n\n"
              "---\n"
              "_Rules sourced from [CLAUDE.md](./CLAUDE.md) · "
              "Powered by [Gemini 1.5 Flash](https://ai.google.dev)_"
          )

          subprocess.run(
              ["gh", "pr", "comment", pr_number, "--body", comment],
              check=True,
          )

          print("Review posted successfully.")
          PYEOF
